<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход - LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background: url('https://adukar.com/images/photo/kak-vybrat-kruzhok-po-robototekhnike-3.jpg') center/cover no-repeat fixed;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 61, 79, 0.65);
            z-index: 0;
        }

        .auth-container {
            position: relative;
            z-index: 1;
            background: #ffffffb0;
            border-radius: 24px;
            border: 1px solid #C5DDE8;
            padding: 45px 50px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(43, 95, 122, 0.08);
            transition: 0.3s;
        }

        .auth-container:hover {
            box-shadow: 0 15px 60px rgba(43, 95, 122, 0.12);
        }

        .auth-container .logo {
            font-family: 'Libertinus Sans', 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 30px;
            color: #1A3D4F;
            text-align: center;
            display: block;
            margin-bottom: 20px;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .auth-container .logo span {
            color: #5BA3C9;
        }

        .auth-container h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1A3D4F;
            text-align: center;
            margin-bottom: 6px;
        }

        .auth-container .subtitle {
            text-align: center;
            color: #7a9aa8;
            font-size: 15px;
            margin-bottom: 28px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #1A3D4F;
            letter-spacing: 0.3px;
        }

        .form-group input {
            padding: 12px 16px;
            border: 1.5px solid #C5DDE8;
            border-radius: 12px;
            font-family: 'Raleway', sans-serif;
            font-size: 14px;
            background: #f8fbfc96;
            transition: 0.3s;
            color: #2C3E50;
            width: 100%;
            outline: none;
        }

        .form-group input:focus {
            border-color: #5BA3C9;
            background: #ffffff96;
            box-shadow: 0 0 0 4px rgba(91, 163, 201, 0.12);
        }

        .form-group input::placeholder {
            color: #b0c4d0;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #3A7B9E;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: #2B5F7A;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(58, 123, 158, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #7a9aa8;
        }

        .auth-links a {
            color: #2B5F7A;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .auth-links a:hover {
            color: #1A3D4F;
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 9999;
            color: #fff;
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #1A6B4A;
        }

        .toast.error {
            background: #c0392b;
        }

        .toast.info {
            background: #2B5F7A;
        }

        @media (max-width: 500px) {
            .auth-container {
                padding: 30px 24px;
                border-radius: 20px;
            }

            .auth-container .logo {
                font-size: 26px;
            }

            .auth-container h2 {
                font-size: 20px;
            }

            .auth-container .subtitle {
                font-size: 14px;
                margin-bottom: 22px;
            }

            .form-group {
                margin-bottom: 14px;
            }

            .form-group input {
                padding: 10px 14px;
                font-size: 13px;
                border-radius: 10px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 15px;
                border-radius: 10px;
            }

            .auth-links {
                font-size: 13px;
                margin-top: 16px;
            }

            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                max-width: none;
                padding: 12px 20px;
                font-size: 13px;
                border-radius: 10px;
            }
        }

        @media (max-width: 380px) {
            .auth-container {
                padding: 22px 16px;
                border-radius: 16px;
            }

            .auth-container .logo {
                font-size: 22px;
            }

            .auth-container h2 {
                font-size: 18px;
            }

            .form-group input {
                padding: 8px 12px;
                font-size: 12px;
            }

            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="logo">LMS<span>.</span></a>
        <h2>Вход в систему</h2>
        <p class="subtitle">Войдите в свой аккаунт</p>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="email@example.com" value="dima@gmail.com">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="loginPassword" placeholder="Введите пароль" value="dima12345">
        </div>

        <button class="btn btn-primary" onclick="login()">Войти</button>

        <div class="auth-links">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_URL = 'http://localhost:3000';

        async function login() {
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showToast('Заполните все поля', 'error');
                return;
            }

            try {
                const response = await fetch(API_URL + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!data.ok) {
                    showToast(data.error || 'Неверный email или пароль', 'error');
                    return;
                }

                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('userName', data.user.name);
                localStorage.setItem('userEmail', data.user.email);
                localStorage.setItem('userRole', data.user.role);
                if (data.user.avatar) {
                    localStorage.setItem('userAvatar', data.user.avatar);
                }

                showToast('Добро пожаловать, ' + data.user.name + '!', 'success');

                setTimeout(function() {
                    const role = data.user.role;
                    if (role === 'admin') window.location.href = 'admin.html';
                    else if (role === 'teacher') window.location.href = 'teacher.html';
                    else if (role === 'curator') window.location.href = 'curator.html';
                    else window.location.href = 'profile.html';
                }, 500);

            } catch (error) {
                console.error('Ошибка входа:', error);
                showToast('Ошибка подключения к серверу', 'error');
            }
        }

        let toastTimer;

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type || 'info');
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() {
                toast.classList.remove('show');
            }, 4000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('userId') && localStorage.getItem('userEmail')) {
                const role = localStorage.getItem('userRole');
                if (role === 'admin') window.location.href = 'admin.html';
                else if (role === 'teacher') window.location.href = 'teacher.html';
                else if (role === 'curator') window.location.href = 'curator.html';
                else window.location.href = 'profile.html';
            }
        });
    </script>

</body>
</html>
