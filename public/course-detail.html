        .toast.error { background: #c0392b; }

        .footer-main {

    <script>
        function updateSidebar() {
            const userName = localStorage.getItem('userName') || 'Пользователь';
            const userRole = localStorage.getItem('userRole') || 'student';

            const nameEl = document.getElementById('sidebarName');
            const avatarEl = document.getElementById('sidebarAvatar');
            const roleEl = document.getElementById('sidebarRole');

            if (nameEl) nameEl.textContent = userName;
            if (avatarEl) {
                const parts = userName.split(' ');
                avatarEl.textContent = parts.length >= 2 ?
                    (parts[0].charAt(0) + parts[1].charAt(0)).toUpperCase() :
                    userName.substring(0, 2).toUpperCase();
            }
            if (roleEl) {
                const roleMap = { 'student': 'Студент', 'teacher': 'Преподаватель', 'curator': 'Куратор', 'admin': 'Администратор' };
                roleEl.textContent = roleMap[userRole] || 'Пользователь';
            }
        }

        function initNav() {
            const userId = localStorage.getItem('userId');
            const guestNav = document.getElementById('guestNav');
            const userNav = document.getElementById('userNav');

            if (userId) {
                if (guestNav) guestNav.style.display = 'none';
                if (userNav) {
                    userNav.style.display = 'flex';
                    const nameSpan = document.getElementById('userNameDisplay');
                    if (nameSpan) nameSpan.textContent = localStorage.getItem('userName') || 'Пользователь';
                }
            } else {
                if (guestNav) guestNav.style.display = 'flex';
                if (userNav) userNav.style.display = 'none';
            }
            updateSidebar();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.className = 'toast ' + (type || 'info');
            toast.classList.add('show');
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // ============================================================
        function getCourseById(id) {
            for (var i = 0; i < coursesFullData.length; i++) {
                if (coursesFullData[i].id === id) {
                    return coursesFullData[i];
                }
            }
            return null;
        }

        function getLessonById(course, lessonId) {
            for (var i = 0; i < course.lessons.length; i++) {
                if (course.lessons[i].id === lessonId) {
                    return course.lessons[i];
                }
            }
            return null;
        }

        function loadSavedProgress(courseId) {
            var saved = localStorage.getItem('courseProgress_' + courseId);
            if (saved) {
                try {
                    var data = JSON.parse(saved);
                    var course = getCourseById(courseId);
                    if (course) {
                        for (var i = 0; i < course.lessons.length; i++) {
                            var less = course.lessons[i];
                            var savedLesson = data.find(function(l) { return l.id === less.id; });
                            if (savedLesson) {
                                less.completed = savedLesson.completed || false;
                                if (less.type === 'test') {
                                    less.score = savedLesson.score || 0;
                                    less.passed = savedLesson.passed || false;
                                }
                            }
                        }
                    }
                } catch (e) {}
            }
        }

        function saveProgress(courseId) {
            var course = getCourseById(courseId);
            if (!course) return;
            var data = [];
            for (var i = 0; i < course.lessons.length; i++) {
                var less = course.lessons[i];
                var obj = { id: less.id, completed: less.completed };
                if (less.type === 'test') {
                    obj.score = less.score || 0;
                    obj.passed = less.passed || false;
                }
                data.push(obj);
            }
            localStorage.setItem('courseProgress_' + courseId, JSON.stringify(data));
        }

        function getEnrolledCourses() {
            return JSON.parse(localStorage.getItem('enrolledCourses') || '[]');
        }

        function renderSkills(course) {
            var skillProgress = {};
            var totalBySkill = {};
            for (var i = 0; i < course.lessons.length; i++) {
                var less = course.lessons[i];
                if (less.skill) {
                    if (!totalBySkill[less.skill]) totalBySkill[less.skill] = 0;
                    totalBySkill[less.skill]++;
                    if (less.completed) {
                        if (!skillProgress[less.skill]) skillProgress[less.skill] = 0;
                        skillProgress[less.skill]++;
                    }
                }
            }
            var html = '<div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:20px 0;">';
            for (var skill in totalBySkill) {
                var total = totalBySkill[skill];
                var done = skillProgress[skill] || 0;
                var percent = Math.round((done / total) * 100);
                var statusClass = 'todo';
                var statusText = 'Требует внимания';
                if (percent >= 80) { statusClass = 'mastered'; statusText = 'Освоен'; }
                else if (percent >= 40) { statusClass = 'learning'; statusText = 'В процессе'; }
                html += '<div style="background:#F8FBFC; border-radius:12px; padding:14px 16px; border:1px solid #EDE5D8;">' +
                    '<div style="font-size:13px; font-weight:600; color:#1A3D4F; margin-bottom:6px;">' + skill + '</div>' +
                    '<div style="background:#F0F6FA; border-radius:10px; height:8px; overflow:hidden;">' +
                    '<div style="height:100%; border-radius:10px; width:' + percent + '%; background:' + (statusClass === 'mastered' ? '#27ae60' : statusClass === 'learning' ? '#F2C94C' : '#e74c3c') + '; transition:width 0.8s ease;"></div>' +
                    '</div>' +
                    '<div style="font-size:12px; color:#7a9aa8; margin-top:4px;">' + percent + '% ' + statusText + ' (' + done + '/' + total + ')</div>' +
                    '</div>';
            }
            html += '</div>';
            return html;
        }

        function renderCourse() {
            var params = new URLSearchParams(window.location.search);
            var courseId = parseInt(params.get('id'));
            var course = getCourseById(courseId);

            if (!course) {
                document.getElementById('courseContent').innerHTML =
                    '<div style="text-align:center; padding:60px; background:#fff; border-radius:16px; border:1px solid #C5DDE8;">' +

                    '<a href="courses.html" class="btn btn-primary" style="margin-top:20px;">Вернуться к курсам</a>' +
                    '</div>';
                return;
            }

            var enrolled = getEnrolledCourses();
            var isEnrolled = enrolled.some(function(c) { return c.id === courseId; });

            if (!isEnrolled) {
                document.getElementById('courseContent').innerHTML =
                    '<div style="text-align:center; padding:60px; background:#fff; border-radius:16px; border:1px solid #C5DDE8;">' +
                    '<h2 style="color:#1A3D4F;">Вы не записаны на этот курс</h2>' +
                    '<p style="color:#7a9aa8; margin:10px 0;">Чтобы получить доступ, запишитесь на курс.</p>' +
                    '<button class="btn btn-primary" style="margin-top:20px;" onclick="enrollFromDetail(' + courseId + ')">Записаться на курс</button>' +
                    '<a href="courses.html" class="btn btn-outline" style="margin-top:10px; display:inline-block;">Вернуться к курсам</a>' +
                    '</div>';
                return;
            }

            loadSavedProgress(courseId);

            var total = course.lessons.length;
            var completedCount = 0;
            for (var i = 0; i < course.lessons.length; i++) {
                if (course.lessons[i].completed) completedCount++;
            }
            var progress = total > 0 ? Math.round((completedCount / total) * 100) : 0;

            var lessonsHtml = '';
            for (var i = 0; i < course.lessons.length; i++) {
                var less = course.lessons[i];
                var isLocked = i > 0 && !course.lessons[i - 1].completed;
                var statusClass = less.completed ? 'done' : (isLocked ? 'locked' : 'pending');
                var statusText = less.completed ? 'Пройдено' : (isLocked ? 'Заблокировано' : 'Ожидает');

                var actionHtml = '';
                if (less.completed) {
                    actionHtml = '<span style="font-size:13px; color:#1A6B4A;">Пройдено</span>';
                } else if (isLocked) {
                    actionHtml = '<span style="font-size:13px; color:#999;">Выполните предыдущий урок</span>';
                } else {
                    if (less.type === 'theory') {
                        actionHtml = '<button class="btn btn-theory" onclick="showTheory(' + course.id + ', ' + less.id + ')">Изучить теорию</button>';
                    } else if (less.type === 'test') {
                        actionHtml = '<button class="btn btn-test" onclick="startTest(' + course.id + ', ' + less.id + ')">Пройти тест (' + (less.questions ? less.questions.length : 0) + ' вопросов)</button>';
                    } else if (less.type === 'task') {
                        actionHtml = '<button class="btn btn-task" onclick="startTask(' + course.id + ', ' + less.id + ')">Выполнить</button>';
                    }
                }

                lessonsHtml += '<div class="lesson-block ' + (less.completed ? 'completed' : '') + '">' +
                    '<div class="lesson-header">' +
                    '<div><span class="lesson-title">' + less.title + '</span></div>' +
                    '<span class="lesson-status ' + statusClass + '">' + statusText + '</span>' +
                    '</div>' +
                    '<div class="lesson-desc">' + less.desc + '</div>' +
                    '<div class="lesson-actions">' + actionHtml + '</div>' +
                    '</div>';
            }

            var skillsHtml = renderSkills(course);

            document.getElementById('courseContent').innerHTML =
                '<div class="course-info">' +
                '<div class="course-title">' + course.title + '</div>' +
                '<div class="course-meta">' +
                '<span>' + course.duration + '</span>' +
                '<span>' + course.level + '</span>' +
                '<span>' + course.lessons.length + ' уроков</span>' +
                '<span>Вес: ' + course.weight + '</span>' +
                '</div>' +
                '<div class="course-desc">' + course.description + '</div>' +
                '<div class="progress-section">' +
                '<div class="progress-label"><span>Прогресс курса</span><span>' + progress + '% (' + completedCount + '/' + total + ')</span></div>' +
                '<div class="progress-bar"><div class="fill" style="width:' + progress + '%;"></div></div>' +
                '</div>' +
                '<h3 style="margin-top:20px; color:#1A3D4F;">Навыки</h3>' +
                skillsHtml +
                '</div>' +
                '<div class="lessons-section"><h2>Уроки</h2>' + lessonsHtml + '</div>';
        }

        // ============================================================
        // ДЕЙСТВИЯ
        // ============================================================
        function enrollFromDetail(courseId) {
            var course = getCourseById(courseId);
            if (!course) return;
            var enrolled = getEnrolledCourses();
            if (enrolled.some(function(c) { return c.id === courseId; })) {
                showToast('Вы уже записаны на этот курс', 'info');
                renderCourse();
                return;
            }
            enrolled.push({ id: courseId, title: course.title });
            localStorage.setItem('enrolledCourses', JSON.stringify(enrolled));
            showToast('Вы записались на курс "' + course.title + '"!', 'success');
            renderCourse();
        }

        function showTheory(courseId, lessonId) {
            var course = getCourseById(courseId);
            if (!course) return;
            var less = getLessonById(course, lessonId);
            if (!less) return;

            var modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = '<div class="modal-content" style="max-width:700px;">' +
                '<button class="modal-close" onclick="this.closest(\'.modal\').remove()">✕</button>' +
                '<h2 style="font-size:22px; font-weight:700; color:#1A3D4F; margin-bottom:8px;">' + less.title + '</h2>' +
                '<p style="color:#7a9aa8; margin-bottom:20px;">' + less.desc + '</p>' +
                '<div style="background:#F8FBFC; padding:20px; border-radius:12px; margin:15px 0; line-height:1.8;">' + less.content + '</div>' +
                '<div style="display:flex; gap:12px; margin-top:15px; justify-content:flex-end;">' +
                '<button class="btn btn-outline" onclick="this.closest(\'.modal\').remove()">Закрыть</button>' +
                '<button class="btn btn-success" onclick="markTheoryRead(' + courseId + ', ' + lessonId + ')">Изучено</button>' +
                '</div></div>';
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) { if (e.target === this) this.remove(); });
        }

        function markTheoryRead(courseId, lessonId) {
            var course = getCourseById(courseId);
            if (!course) return;
            var less = getLessonById(course, lessonId);
            if (!less) return;
            less.completed = true;
            saveProgress(courseId);
            var modal = document.querySelector('.modal');
            if (modal) modal.remove();
            showToast('Теория "' + less.title + '" изучена!', 'success');
            renderCourse();
        }

        function startTest(courseId, lessonId) {
            var course = getCourseById(courseId);
            if (!course) return;
            var less = getLessonById(course, lessonId);
            if (!less) return;

            if (less.completed) {
                showToast('Тест уже пройден (' + less.score + '%)', 'info');
                return;
            }

            var modal = document.createElement('div');
            modal.className = 'modal';

            var questionsHtml = '';
            for (var i = 0; i < less.questions.length; i++) {
                var q = less.questions[i];
                var optionsHtml = '';
                for (var oi = 0; oi < q.options.length; oi++) {
                    optionsHtml += '<label class="test-option" onclick="selectTestOption(this, ' + i + ', ' + oi + ')">' +
                        '<input type="radio" name="q' + i + '" value="' + oi + '">' +
                        '<span>' + q.options[oi] + '</span>' +
                        '<div class="explanation">' + (q.explanation || '') + '</div>' +
                        '</label>';
                }
                questionsHtml += '<div style="margin-bottom:18px; padding:15px; background:#F8FBFC; border-radius:12px; border:1px solid #C5DDE8;">' +
                    '<p style="font-weight:600; margin-bottom:10px; color:#1A3D4F;">' + (i + 1) + '. ' + q.text + '</p>' +
                    '<div style="display:flex; flex-direction:column; gap:6px;">' + optionsHtml + '</div>' +
                    '<div id="feedback' + i + '" style="margin-top:8px; font-weight:600; display:none;"></div></div>';
            }

            modal.innerHTML = '<div class="modal-content" style="max-width:650px;">' +
                '<button class="modal-close" onclick="this.closest(\'.modal\').remove()">✕</button>' +
                '<h2 style="font-size:22px; font-weight:700; color:#1A3D4F; margin-bottom:8px;">Тест: ' + less.title + '</h2>' +
                '<p style="color:#7a9aa8; margin-bottom:20px;">' + less.desc + ' (' + less.questions.length + ' вопросов)</p>' +
                '<form id="testForm">' + questionsHtml +
                '<div style="display:flex; gap:12px; margin-top:20px; flex-wrap:wrap;">' +
                '<button type="button" class="btn btn-outline" onclick="this.closest(\'.modal\').remove()">Отмена</button>' +
                '<button type="submit" class="btn btn-primary">Отправить ответы</button></div></form>' +
                '<div id="testResult" style="margin-top:15px;"></div></div>';

            document.body.appendChild(modal);

            document.getElementById('testForm').addEventListener('submit', function(e) {
                e.preventDefault();
                var correct = 0;
                var total = less.questions.length;

                for (var i = 0; i < total; i++) {
                    var selected = document.querySelector('input[name="q' + i + '"]:checked');
                    var feedback = document.getElementById('feedback' + i);

                    if (selected) {
                        var value = parseInt(selected.value);
                        var isCorrect = value === less.questions[i].correct;
                        var options = document.querySelectorAll('input[name="q' + i + '"]');
                        options.forEach(function(opt, idx) {
                            var parent = opt.closest('.test-option');
                            parent.classList.remove('selected', 'correct', 'wrong');
                            if (idx === less.questions[i].correct) parent.classList.add('correct');
                            if (opt.checked && idx !== less.questions[i].correct) parent.classList.add('wrong');
                            var expl = parent.querySelector('.explanation');
                            if (expl) expl.classList.add('show');
                        });
                        if (isCorrect) { correct++; feedback.style.color = '#27ae60'; feedback.textContent = 'Верно!'; }
                        else { feedback.style.color = '#c0392b'; feedback.textContent = 'Неверно. Правильный ответ: ' + less.questions[i].options[less.questions[i].correct]; }
                        feedback.style.display = 'block';
                    } else {
                        feedback.style.color = '#e67e22';
                        feedback.textContent = 'Вы не ответили на вопрос';
                        feedback.style.display = 'block';
                    }
                }

                var score = Math.round((correct / total) * 100);
                var passed = score >= 70;

                document.querySelector('#testForm button[type="submit"]').disabled = true;
                document.querySelector('#testForm button[type="submit"]').textContent = 'Результат';

                var resultDiv = document.getElementById('testResult');
                resultDiv.innerHTML =
                    '<div style="background:' + (passed ? '#E8F5E9' : '#FDE8E8') + '; padding:16px; border-radius:12px; text-align:center; margin-top:15px;">' +
                    '<div style="font-size:48px;">' + (passed ? '' : '') + '</div>' +
                    '<h3 style="color:' + (passed ? '#1A6B4A' : '#c0392b') + ';">' + score + '% ' + (passed ? 'Тест пройден!' : 'Попробуйте ещё раз') + '</h3>' +
                    '<p>Правильных: ' + correct + ' из ' + total + '</p>' +
                    (passed ? '<button class="btn btn-success" style="margin-top:15px;" onclick="this.closest(\'.modal\').remove(); renderCourse();">Продолжить обучение</button>' :
                    '<button class="btn btn-outline" style="margin-top:15px;" onclick="this.closest(\'.modal\').remove(); startTest(' + courseId + ', ' + lessonId + ')">Попробовать снова</button>') +
                    '</div>';

                if (passed) {
                    less.completed = true;
                    less.score = score;
                    less.passed = passed;
                    saveProgress(courseId);
                    showToast('Тест: ' + less.title + ' ' + score + '% (Пройден)', 'success');
                    renderCourse();
                } else {
                    showToast('Тест: ' + less.title + ' ' + score + '% (Не пройден)', 'error');
                }
            });
        }

        function selectTestOption(el, qIndex, optIndex) {
            var parent = el.closest('div[style]');
            var options = parent.querySelectorAll('.test-option');
            options.forEach(function(o) {
                o.classList.remove('selected');
                o.querySelector('input[type="radio"]').checked = false;
            });
            el.classList.add('selected');
            el.querySelector('input[type="radio"]').checked = true;
        }

        function startTask(courseId, lessonId) {
            var course = getCourseById(courseId);
            if (!course) return;
            var less = getLessonById(course, lessonId);
            if (!less) return;

            if (less.completed) {
                showToast('Задание "' + less.title + '" уже выполнено!', 'info');
                return;
            }

            var modal = document.createElement('div');
            modal.className = 'modal';
            var code = less.codeTemplate || '';

            modal.innerHTML = '<div class="modal-content" style="max-width:700px;">' +
                '<button class="modal-close" onclick="this.closest(\'.modal\').remove()">✕</button>' +
                '<h2 style="font-size:22px; font-weight:700; color:#1A3D4F; margin-bottom:8px;">Задание: ' + less.title + '</h2>' +
                '<p style="color:#7a9aa8; margin-bottom:20px;">' + less.desc + '</p>' +
                '<div style="background:#F8FBFC; padding:16px; border-radius:12px; margin:15px 0; border-left:4px solid #7FC1C5;">' +
                '<h4 style="color:#1A3D4F; margin-bottom:8px;">Задание:</h4>' +
                '<div style="font-size:14px; line-height:1.8; color:#2C3E50;">' + less.taskDescription + '</div></div>' +
                '<div style="background:#FFF8E1; padding:12px; border-radius:10px; margin:10px 0; border-left:4px solid #F2C94C;">' +
                '<strong>Критерий выполнения:</strong><span style="font-size:14px; color:#2C3E50;">' + less.taskCheck + '</span></div>' +
                '<div style="margin-top:15px;"><label style="font-weight:600; color:#1A3D4F; display:block; margin-bottom:8px;">Ваш код:</label>' +
                '<div class="task-code-block"><textarea class="code-editor" id="codeEditor" rows="' + Math.max(8, code.split('\n').length) + '">' + code + '</textarea></div></div>' +
                '<div style="display:flex; gap:12px; margin-top:15px; flex-wrap:wrap;">' +
                '<button class="btn btn-outline" onclick="this.closest(\'.modal\').remove()">Отмена</button>' +
                '<button class="btn btn-primary" onclick="checkCode(' + courseId + ', ' + lessonId + ')">Проверить код</button></div>' +
                '<div id="taskResult" style="margin-top:15px;"></div></div>';
            document.body.appendChild(modal);
        }

        function checkCode(courseId, lessonId) {
            var course = getCourseById(courseId);
            if (!course) return;
            var less = getLessonById(course, lessonId);
            if (!less) return;

            var codeEditor = document.getElementById('codeEditor');
            if (!codeEditor) return;

            var userCode = codeEditor.value.trim();
            var solutionCode = (less.codeSolution || '').trim();

            var isCorrect = userCode === solutionCode || userCode.length > 10;

            var resultDiv = document.getElementById('taskResult');

            if (isCorrect) {
                less.completed = true;
                saveProgress(courseId);
                resultDiv.innerHTML =
                    '<div style="background:#E8F5E9; padding:16px; border-radius:12px; text-align:center;">' +
                    '<div style="font-size:48px;"></div>' +
                    '<h3 style="color:#1A6B4A;">Задание выполнено верно!</h3>' +
                    '<button class="btn btn-success" style="margin-top:15px;" onclick="this.closest(\'.modal\').remove(); renderCourse();">Продолжить обучение</button></div>';
                showToast('Задание "' + less.title + '" выполнено!', 'success');
                renderCourse();
            } else {
                resultDiv.innerHTML =
                    '<div style="background:#FDE8E8; padding:16px; border-radius:12px; text-align:center;">' +
                    '<div style="font-size:48px;"></div>' +
                    '<h3 style="color:#c0392b;">Код не совпадает с решением</h3>' +
                    '<p style="font-size:14px; color:#2C3E50; margin:10px 0;">Попробуйте ещё раз.</p>' +
                    '<button class="btn btn-outline" style="margin-top:10px;" onclick="document.getElementById(\'taskResult\').innerHTML = \'\';">Понятно</button></div>';
                showToast('Код неверный. Попробуйте ещё раз.', 'error');
            }
        }

        // ============================================================
        // ЗАПУСК
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            var userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }
            initNav();
            renderCourse();
        });
    </script>

</body>
</html>
