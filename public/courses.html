<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Курсы - LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; min-height: 100vh; }
        body { font-family: 'Raleway', sans-serif; background: #E8F4F8; padding: 0; margin: 0; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 50px;
            background: #FFFFFF;
            border-bottom: 1px solid #C5DDE8;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo { font-family: 'Libertinus Sans', 'Raleway', sans-serif; font-weight: 700; font-size: 22px; color: #1A3D4F; letter-spacing: 1px; text-decoration: none; }
        .logo span { color: #5BA3C9; }
        .nav-links { display: flex; gap: 30px; font-family: 'Raleway', sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 0.5px; }
        .nav-links a { color: #2C3E50; text-decoration: none; transition: color 0.3s; }
        .nav-links a:hover { color: #2B5F7A; }
        .header-right { display: flex; gap: 20px; align-items: center; }
        .header-right a { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 14px; text-decoration: none; transition: all 0.3s; letter-spacing: 0.5px; }
        .header-right .login-link { color: #2B5F7A; }
        .header-right .login-link:hover { color: #1A3D4F; text-decoration: underline; }
        .header-right .register-link { color: #FFFFFF; background: #3A7B9E; padding: 10px 28px; border-radius: 30px; }
        .header-right .register-link:hover { background: #2B5F7A; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(58, 123, 158, 0.3); }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; gap: 15px; padding: 15px 20px; }
            .header-left { flex-direction: column; align-items: stretch; gap: 12px; }
            .nav-links { gap: 20px; font-size: 14px; flex-wrap: wrap; }
            .header-right { justify-content: center; flex-wrap: wrap; }
        }

        .dashboard-wrapper {
            display: flex;
            gap: 0;
            align-items: flex-start;
            width: 100%;
            padding: 0;
            margin: 0;
            flex-wrap: wrap;
        }

        .sidebar {
            flex: 0 0 220px;
            background: #FFFFFF;
            border-right: 1px solid #C5DDE8;
            padding: 20px 16px;
            min-height: calc(100vh - 80px);
            box-shadow: 2px 0 10px rgba(43, 95, 122, 0.03);
            position: sticky;
            top: 0;
            align-self: flex-start;
        }

        .sidebar .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid #EDE5D8;
            margin-bottom: 16px;
        }
        .sidebar .user-info .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2B5F7A; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
        .sidebar .user-info .user-name { font-size: 14px; font-weight: 700; color: #1A3D4F; }
        .sidebar .user-info .user-role { font-size: 12px; color: #7a9aa8; }

        .sidebar .search-box { width: 100%; padding: 8px 14px; border: 1px solid #C5DDE8; border-radius: 30px; font-size: 13px; font-family: 'Raleway', sans-serif; background: #F8FBFC; color: #2C3E50; margin-bottom: 16px; transition: 0.3s; }
        .sidebar .search-box:focus { outline: none; border-color: #5BA3C9; background: #FFFFFF; }
        .sidebar .search-box::placeholder { color: #aaa; }

        .sidebar .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14px;
            color: #2C3E50;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        .sidebar .menu-item:hover { background: #F0F6FA; color: #2B5F7A; }
        .sidebar .menu-item.active { background: #2B5F7A; color: #fff; }
        .sidebar .menu-item .icon { width: 20px; text-align: center; font-size: 15px; }
        .sidebar .menu-divider { border: none; border-top: 1px solid #EDE5D8; margin: 12px 0; }

        .main-content {
            flex: 1;
            padding: 30px 50px 30px 40px;
            background: #E8F4F8;
            min-height: calc(100vh - 80px);
        }

        @media (max-width: 1024px) {
            .dashboard-wrapper { flex-direction: column; }
            .sidebar { flex: 1; width: 100%; border-right: none; border-bottom: 1px solid #C5DDE8; min-height: auto; position: static; padding: 16px 20px; }
            .main-content { padding: 20px; }
        }
        @media (max-width: 768px) { .main-content { padding: 15px; } .sidebar { padding: 16px; } }

        .page-title { font-size: 28px; font-weight: 700; color: #1A3D4F; margin-bottom: 8px; }
        .page-subtitle { font-size: 16px; color: #7a9aa8; margin-bottom: 25px; }

        .courses-grid { display: flex; flex-direction: column; gap: 25px; }

        .course-card {
            background: #FFFFFF;
            border-radius: 16px;
            border: 1px solid #C5DDE8;
            padding: 28px 32px;
            transition: all 0.3s;
            box-shadow: 0 2px 10px rgba(43, 95, 122, 0.04);
        }
        .course-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(43, 95, 122, 0.08); }

        .course-card .course-number { font-size: 13px; font-weight: 700; color: #5BA3C9; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .course-card h2 { font-size: 22px; font-weight: 700; color: #1A3D4F; margin-bottom: 10px; }
        .course-card .course-desc { font-size: 15px; line-height: 1.7; color: #2C3E50; margin-bottom: 16px; max-width: 800px; }

        .course-card .course-actions { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

        .btn {
            padding: 8px 24px;
            border: none;
            border-radius: 30px;
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #2B5F7A; color: #fff; }
        .btn-primary:hover { background: #1A3D4F; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(43, 95, 122, 0.25); }
        .btn-success { background: #7FC1C5; color: #1A3D4F; }
        .btn-success:hover { background: #6db3b7; transform: translateY(-2px); }
        .btn-cert { background: transparent; color: #2B5F7A; padding: 6px 16px; font-size: 13px; border: 1px solid #C5DDE8; border-radius: 20px; }
        .btn-cert:hover { background: #F0F6FA; border-color: #5BA3C9; }
        .btn-link { background: transparent; color: #5BA3C9; padding: 6px 12px; font-size: 14px; border: none; }
        .btn-link:hover { color: #2B5F7A; }

        .course-divider { border: none; border-top: 1px solid #EDE5D8; margin: 0; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
            color: #fff;
            max-width: 400px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #1A6B4A; }
        .toast.error { background: #c0392b; }
        .toast.info { background: #2B5F7A; }

        .footer-main {
            background: #FFFFFF;
            border-radius: 30px 30px 0 0;
            border-top: 1px solid #C5DDE8;
            padding: 40px 60px 20px;
            width: 100%;
            box-shadow: 0 -5px 30px rgba(43, 95, 122, 0.04);
        }
        .footer-grid { display: grid; grid-template-columns: 1.4fr 1fr 1.2fr 1fr 0.8fr; gap: 20px; margin-bottom: 25px; max-width: 1400px; margin: 0 auto 25px; }
        .footer-col h4 { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 13px; color: #2B5F7A; margin-bottom: 10px; letter-spacing: 0.5px; }
        .footer-col p { font-size: 14px; line-height: 1.6; color: #2C3E50; margin: 0; }
        .footer-col a { display: block; font-size: 14px; color: #2C3E50; text-decoration: none; padding: 3px 0; transition: color 0.3s; }
        .footer-col a:hover { color: #2B5F7A; text-decoration: underline; }
        .footer-logo { font-family: 'Libertinus Sans', 'Raleway', sans-serif; font-weight: 700; font-size: 24px; color: #1A3D4F; margin-bottom: 8px; }
        .footer-logo span { color: #5BA3C9; }
        .footer-desc { font-size: 14px; color: #7a9aa8; line-height: 1.6; max-width: 220px; }
        .footer-bottom { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-top: 1px solid #EDE5D8; border-bottom: 1px solid #EDE5D8; flex-wrap: wrap; gap: 10px; font-size: 14px; color: #2C3E50; max-width: 1400px; margin: 0 auto; }
        .footer-bottom-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-weight: 600; font-family: 'Raleway', sans-serif; }
        .footer-bottom-left .divider { color: #C5DDE8; }
        .footer-bottom-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; font-size: 14px; }
        .footer-bottom-right a { color: #2B5F7A; text-decoration: none; font-weight: 600; }
        .footer-bottom-right a:hover { text-decoration: underline; }
        .footer-copy { text-align: center; padding-top: 15px; font-size: 13px; color: #7a9aa8; }

        @media (max-width: 1024px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 25px; } .footer-main { padding: 30px 30px 15px; } }
        @media (max-width: 768px) { .footer-grid { grid-template-columns: 1fr; gap: 15px; } .footer-main { padding: 25px 20px 12px; } .footer-bottom { flex-direction: column; align-items: flex-start; gap: 8px; } .footer-desc { max-width: 100%; } .course-card .course-actions { flex-direction: column; align-items: stretch; } .course-card .course-actions .btn { text-align: center; } }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div id="header-placeholder"></div>
    <script>
        fetch('header.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                initNav();
            });
    </script>

    <div class="dashboard-wrapper">

        <aside class="sidebar">

            <input class="search-box" type="text" placeholder="Поиск...">

            <a href="my-courses.html" class="menu-item">
                <span class="icon"><i class="fas fa-th-large"></i></span>
                Мои курсы
            </a>
            <a href="courses.html" class="menu-item active">
                <span class="icon"><i class="fas fa-book"></i></span>
                Все курсы
            </a>
            <a href="calendar.html" class="menu-item">
                <span class="icon"><i class="fas fa-calendar-alt"></i></span>
                Календарь
            </a>
            <a href="profile.html" class="menu-item">
                <span class="icon"><i class="fas fa-user"></i></span>
                Профиль
            </a>

            <hr class="menu-divider">

            <a href="#" class="menu-item" onclick="logout()">
                <span class="icon"><i class="fas fa-sign-out-alt"></i></span>
                Выйти
            </a>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Содержание уроков</h1>
            <p class="page-subtitle">Выберите курс и начните обучение</p>

            <div class="courses-grid" id="coursesContainer">
                <div style="text-align:center; padding:40px; color:#7a9aa8;">Загрузка курсов...</div>
            </div>
        </main>

    </div>

    <div id="footer-placeholder"></div>
    <script>
        fetch('footer.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>

    <script>
        function updateSidebar() {
            const userName = localStorage.getItem('userName') || 'Пользователь';
            const userRole = localStorage.getItem('userRole') || 'student';

            const nameEl = document.getElementById('sidebarName');
            const avatarEl = document.getElementById('sidebarAvatar');
            const roleEl = document.getElementById('sidebarRole');

            if (nameEl) nameEl.textContent = userName;
            if (avatarEl) {
                const parts = userName.split(' ');
                avatarEl.textContent = parts.length >= 2 ?
                    (parts[0].charAt(0) + parts[1].charAt(0)).toUpperCase() :
                    userName.substring(0, 2).toUpperCase();
            }
            if (roleEl) {
                const roleMap = { 'student': 'Студент', 'teacher': 'Преподаватель', 'curator': 'Куратор', 'admin': 'Администратор' };
                roleEl.textContent = roleMap[userRole] || 'Пользователь';
            }
        }

        function initNav() {
            const userId = localStorage.getItem('userId');
            const guestNav = document.getElementById('guestNav');
            const userNav = document.getElementById('userNav');

            if (userId) {
                if (guestNav) guestNav.style.display = 'none';
                if (userNav) {
                    userNav.style.display = 'flex';
                    const nameSpan = document.getElementById('userNameDisplay');
                    if (nameSpan) nameSpan.textContent = localStorage.getItem('userName') || 'Пользователь';
                }
            } else {
                if (guestNav) guestNav.style.display = 'flex';
                if (userNav) userNav.style.display = 'none';
            }
            updateSidebar();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.className = 'toast ' + (type || 'info');
            toast.classList.add('show');
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        let allCourses = [];
        let enrolledCourses = [];

        function loadCourses() {
            fetch('/api/courses')
                .then(res => res.json())
                .then(courses => {
                    allCourses = courses;
                    return fetch('/api/students/' + localStorage.getItem('userId') + '/results');
                })
                .then(res => res.json())
                .then(results => {
                    enrolledCourses = results;
                    renderCourses();
                })
                .catch(err => {
                    console.error('Ошибка загрузки:', err);
                    document.getElementById('coursesContainer').innerHTML = '<div style="text-align:center; padding:40px; color:#c0392b;">Ошибка загрузки курсов</div>';
                });
        }

        function renderCourses() {
            const container = document.getElementById('coursesContainer');

            if (allCourses.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:60px; background:#fff; border-radius:16px; border:1px solid #C5DDE8;">
                        <h3 style="color:#1A3D4F;">Курсов пока нет</h3>
                        <p style="color:#7a9aa8;">Преподаватели ещё не создали курсы</p>
                    </div>
                `;
                return;
            }

            const userId = parseInt(localStorage.getItem('userId'));
            const userRole = localStorage.getItem('userRole');

            let html = '';
            allCourses.forEach((course, index) => {
                const isEnrolled = enrolledCourses.some(r => r.course_title === course.title);
                const isCompleted = enrolledCourses.some(r => r.course_title === course.title && r.grade !== 'Неудовлетворительно');

                let statusText = '';
                if (isCompleted) statusText = ' Пройден';
                else if (isEnrolled) statusText = 'В процессе';
                else statusText = ' Доступен';

                const btnHtml = isEnrolled ?
                    `<button class="btn btn-success" onclick="continueCourse(${course.id})"> Продолжить обучение</button>` :
                    `<button class="btn btn-primary" onclick="enrollCourse(${course.id})"> Записаться на курс</button>`;

                html += `
                    <div class="course-card">
                        <div class="course-number">Модуль ${String(index + 1).padStart(2, '0')}</div>
                        <h2>${course.title}</h2>
                        <p class="course-desc">${course.description || 'Описание отсутствует'}</p>
                        <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:14px;">
                            <span style="font-size:13px; color:#7a9aa8;">Вес: ${course.weight || 1.0}</span>
                            <span style="padding:4px 14px; border-radius:20px; font-size:12px; font-weight:600; background:#F0F6FA; color:#2C3E50;">${statusText}</span>
                        </div>
                        <div class="course-actions">
                            ${btnHtml}
                            <button class="btn btn-cert" onclick="showCert(${course.id})">Сертификат</button>
                        </div>
                    </div>
                    ${index < allCourses.length - 1 ? '<hr class="course-divider">' : ''}
                `;
            });

            container.innerHTML = html;
        }

        function enrollCourse(courseId) {
            const userId = parseInt(localStorage.getItem('userId'));
            const course = allCourses.find(c => c.id === courseId);
            if (!course) return;

            if (enrolledCourses.some(r => r.course_title === course.title)) {
                showToast('Вы уже записаны на этот курс', 'info');
                return;
            }

            fetch('/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    studentId: userId,
                    courseId: courseId,
                    grades: [{ value: 0, weight: 1.0 }]
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.saved) {
                    showToast('Вы записались на курс "' + course.title + '"!', 'success');
                    addCalendarEvent(userId, localStorage.getItem('userName'), 'student', 'записался на курс "' + course.title + '"');
                    loadCourses();
                } else {
                    showToast(' Ошибка записи', 'error');
                }
            })
            .catch(err => {
                showToast(' Ошибка записи', 'error');
            });
        }

        function continueCourse(courseId) {
            window.location.href = 'course-detail.html?id=' + courseId;
        }

        function showCert(courseId) {
            const course = allCourses.find(c => c.id === courseId);
            if (!course) return;

            const isCompleted = enrolledCourses.some(r => r.course_title === course.title && r.grade !== 'Неудовлетворительно');

            if (!isCompleted) {
                const isEnrolled = enrolledCourses.some(r => r.course_title === course.title);
                if (!isEnrolled) {
                    showToast('Сначала запишитесь на курс', 'error');
                } else {
                    showToast('Завершите курс, чтобы получить сертификат', 'error');
                }
                return;
            }

            showToast(' Сертификат по курсу "' + course.title + '" готов!', 'success');
        }

        function addCalendarEvent(userId, userName, userRole, action) {
            const events = JSON.parse(localStorage.getItem('calendar_events_all') || '[]');
            const today = new Date();
            events.push({
                id: Date.now() + Math.random(),
                userId: userId,
                userName: userName,
                userRole: userRole,
                action: action,
                type: 'enroll',
                date: today.toISOString().split('T')[0],
                time: String(today.getHours()).padStart(2, '0') + ':' + String(today.getMinutes()).padStart(2, '0'),
                timestamp: today.getTime()
            });
            localStorage.setItem('calendar_events_all', JSON.stringify(events));
        }

        document.addEventListener('DOMContentLoaded', function() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }
            loadCourses();
        });

fetch('/api/calendar/event', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
        user_id: parseInt(localStorage.getItem('userId')),
        user_name: localStorage.getItem('userName'),
        user_role: localStorage.getItem('userRole'),
        action: 'записался на курс "' + course.title + '"'
    })
});
    </script>

</body>
</html>
