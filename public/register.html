<h1>Регистрация</h1>
<input id="name" placeholder="Имя"><br>
<input id="email" placeholder="Email"><br>
<input id="password" placeholder="Пароль"><br>
<button onclick="reg()">Зарегистрироваться</button>
<div id="msg"></div>

<script>
async function reg() {
  const res = await fetch('/api/register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  if(data.ok) location.href = 'login.html';
  else document.getElementById('msg').innerText = data.error;
}
</script>
